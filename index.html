<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .card-input { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; }
        textarea { width: 100%; height: 80px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .workspace { display: flex; flex-direction: row; gap: 20px; width: 100%; }
        .editor-box { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-box { flex: 1; background: #525659; padding: 15px; border-radius: 12px; }
        canvas { width: 100% !important; height: auto !important; }
        .field { margin-bottom: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 15px; width: 100%; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="card-input">
        <h2>1. Cole o Chamado</h2>
        <textarea id="textoBruto" placeholder="Cole o chamado aqui..."></textarea>
    </div>

    <div class="workspace">
        <div class="editor-box">
            <h2>Editor</h2>
            <div class="field"><label>Chamado Santander</label><input type="text" id="f_inc"></div>
            <button class="btn-save" onclick="salvarAtendimento()">💾 Salvar no Supabase</button>
        </div>
        <div class="preview-box">
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function salvarAtendimento() {
        const payload = {
            chamado_santander: document.getElementById('f_inc').value,
            texto_bruto: document.getElementById('textoBruto').value,
            analista: 'Willian'
        };

        const { error } = await supabaseClient.from('chamados').insert([payload]);
        
        if (error) {
            alert("Erro ao salvar: " + error.message);
        } else {
            alert("Chamado Santander salvo com sucesso!");
        }
    }
</script>
</body>
</html>
