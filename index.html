<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Controle e Emissão</title>
    <!-- Bibliotecas com carregamento garantido -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }
        .editor-box { flex: 1; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-box { flex: 1; background: #525659; display: flex; justify-content: center; align-items: center; min-height: 500px; border-radius: 12px; }
        canvas { max-width: 95%; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="container">
    <div class="editor-box">
        <h3>Editor de RAT</h3>
        <div class="field"><label>Número do Chamado</label><input type="text" id="f_inc" oninput="atualizarPreview()"></div>
        <div class="field"><label>Responsável</label><input type="text" id="f_resp" oninput="atualizarPreview()"></div>
        <button class="btn-save" onclick="salvarAtendimento()">Guardar Atendimento</button>
    </div>
    
    <div class="preview-box">
        <canvas id="pdfCanvas"></canvas>
    </div>
</div>

<script>
    // Garantir que o PDF.js usa o worker correto
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    async function atualizarPreview() {
        // Verifica se o PDFLib carregou
        if (typeof PDFLib === 'undefined') {
            console.error("PDFLib ainda não carregou.");
            return;
        }

        try {
            const { PDFDocument, StandardFonts } = PDFLib;
            const pdfDoc = await PDFDocument.create();
            const page = pdfDoc.addPage([595, 842]);
            const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            
            const inc = document.getElementById('f_inc').value;
            const resp = document.getElementById('f_resp').value;
            
            page.drawText(`RAT - Chamado: ${inc}`, { x: 50, y: 800, size: 20, font });
            page.drawText(`Responsável: ${resp}`, { x: 50, y: 770, size: 12, font });
            
            const pdfBytes = await pdfDoc.save();
            renderizarPDF(pdfBytes);
        } catch (e) {
            console.error("Erro ao gerar preview:", e);
        }
    }

    async function renderizarPDF(data) {
        const loadingTask = pdfjsLib.getDocument({ data: data });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const canvas = document.getElementById('pdfCanvas');
        const context = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 1.0 });
        
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({ canvasContext: context, viewport: viewport }).promise;
    }

    // Aguarda o carregamento completo da página antes de iniciar
    window.onload = atualizarPreview;
</script>
</body>
</html>
