<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Visualizador Pro - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        h2 { color: #1e293b; text-align: center; font-size: 1.1rem; border-bottom: 2px solid #3b82f6; padding-bottom: 8px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; font-size: 16px; box-sizing: border-box; }
        
        .info-painel { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; background: #f8fafc; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .info-item { text-align: center; border-right: 1px solid #e2e8f0; padding: 2px; }
        .info-item:last-child { border-right: none; }
        .info-label { display: block; font-size: 9px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 11px; color: #1e293b; font-weight: bold; word-break: break-all; }

        .btn-group { display: flex; gap: 8px; margin-bottom: 15px; }
        button { flex: 1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 14px; transition: 0.2s; }
        .btn-save { background: #3b82f6; color: white; }
        .btn-pdf { background: #10b981; color: white; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }

        #viewerContainer { display: none; width: 100%; margin-top: 10px; background: #525659; border-radius: 8px; padding: 10px; box-sizing: border-box; text-align: center; }
        canvas { width: 100% !important; height: auto !important; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-radius: 4px; }
        .msg-view { color: white; font-size: 11px; margin-bottom: 8px; display: block; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📄 Gerador de RAT Santander</h2>
    <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="extrairDados()"></textarea>
    
    <div class="info-painel">
        <div class="info-item"><span class="info-label">INC / SN</span><span id="pIncSn" class="info-value">---</span></div>
        <div class="info-item"><span class="info-label">Resp. / Matrícula</span><span id="pRespMat" class="info-value">---</span></div>
        <div class="info-item"><span class="info-label">MAC</span><span id="pMac" class="info-value">---</span></div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="salvarAtendimento()">💾 Salvar</button>
        <button class="btn-pdf" id="btnGerar" onclick="gerarERenderizar()">👁️ Visualizar RAT</button>
    </div>

    <div id="viewerContainer">
        <span class="msg-view">PRÉ-VISUALIZAÇÃO DA RAT:</span>
        <canvas id="pdfCanvas"></canvas>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let dados = { inc:'', uniorg:'', rua:'', num:'', cid:'', uf:'', bai:'', cep:'', patri:'', sn:'', modelo:'', host:'', solucao:'', resp:'', matricula:'', mac:'', p:{h:'00',m:'00'}, c:{h:'00',m:'00'}, a:{h:'00',m:'00'} };

    function ajustarNomeSequencial(nome, limitePx) {
        const larguraEstimadaChar = 5.8;
        let partes = nome.split(' ').filter(p => {
            const pLower = p.toLowerCase();
            return p.length > 0 && !(['da', 'de', 'do', 'das', 'dos'].includes(pLower));
        });
        while (partes.length > 1 && (partes.join(' ').length * larguraEstimadaChar) > limitePx) {
            partes.pop();
        }
        return partes.join(' ');
    }

    async function extrairDados() {
        const texto = document.getElementById('textoBruto').value;
        if(!texto) return;

        dados.inc = (/(INC\d+)/i.exec(texto) || ["","---"])[1].toUpperCase();
        dados.patri = (/SGPI\s*:\s*(\d+)/i.exec(texto) || ["","---"])[1];
        dados.host = (/Hostname\s*:\s*(\S+)/i.exec(texto) || ["","---"])[1].toUpperCase();
        
        // Extração Matrícula
        dados.matricula = (/Matrícula\s*:\s*(\S+)/i.exec(texto) || ["","---"])[1].toUpperCase();

        // Extração MAC Address (Deixa em branco se não encontrar)
        const matchMac = /MAC\s*:\s*(\S+)/i.exec(texto);
        dados.mac = matchMac ? matchMac[1].toUpperCase() : '';
        
        let nomeBruto = (/Solicitante\s*:\s*(.+)/i.exec(texto) || ["","---"])[1].trim().toUpperCase();
        dados.resp = ajustarNomeSequencial(nomeBruto, 168);
        
        const mSn = (/(?:SN|Serial)\s*:\s*(\S+)/i.exec(texto) || ["","---"])[1].toUpperCase();
        dados.sn = mSn;

        if (mSn.startsWith('P')) dados.modelo = "LENOVO T14";
        else if (mSn.startsWith('B')) dados.modelo = "HP ELITEBOOK 640 G9";
        else dados.modelo = "---";

        const mSol = /ITEM A SER SUBSTITUÍDO\s*=\s*(.+)/i.exec(texto);
        if (mSol) {
            let item = mSol[1].toUpperCase().split('AGBANESPA')[0].trim();
            dados.solucao = "REALIZADO " + item;
        } else {
            dados.solucao = "REALIZADO MANUTENÇÃO PREVENTIVA/CORRETIVA";
        }

        dados.uniorg = (/Uniorg\s*:\s*(\d+)/i.exec(texto) || ["","---"])[1];

        const mFullEnd = /Endereço\s*:\s*(.+)/i.exec(texto);
        if (mFullEnd) {
            const linhaEnd = mFullEnd[1];
            dados.rua = (/^([^0-9,]+)/.exec(linhaEnd) || ["","---"])[1].trim();
            dados.num = (/(\d+)/.exec(linhaEnd.replace(dados.rua, "")) || ["","---"])[1];
            dados.cid = (/-\s*([^,]+)/.exec(linhaEnd) || ["","---"])[1].trim();
            dados.uf = (/,\s*([A-Z]{2})/.exec(linhaEnd) || ["",""])[1];
            const mCep = /(\d{8})/.exec(linhaEnd.replace(/\s/g, ""));
            if (mCep && mCep[1] !== dados.cep) { dados.cep = mCep[1]; buscarBairro(dados.cep); }
        }
        
        const reg = (l) => new RegExp(l + "\\s*:\\s*\\d{2}\\/\\d{2}\\/\\d{4}\\s+(\\d{2}):(\\d{2})", "i").exec(texto);
        const p = reg("Início"), c = reg("Chegada"), a = reg("Atendimento");
        if(p) dados.p = {h:p[1], m:p[2]}; if(c) dados.c = {h:c[1], m:c[2]}; if(a) dados.a = {h:a[1], m:a[2]};

        document.getElementById('pIncSn').innerText = `${dados.inc} / ${dados.sn}`;
        document.getElementById('pRespMat').innerText = `${dados.resp} / ${dados.matricula}`;
        document.getElementById('pMac').innerText = dados.mac || "---";
        document.getElementById('pSolucao').innerText = dados.solucao;
    }

    async function buscarBairro(cep) {
        try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if (!data.erro) { dados.bai = data.bairro.toUpperCase(); }
        } catch (e) {}
    }

    async function gerarERenderizar() {
        const btn = document.getElementById('btnGerar');
        btn.disabled = true;
        try {
            const response = await fetch(URL_MODELO_PDF + '?v=' + Date.now());
            const pdfDoc = await PDFLib.PDFDocument.load(await response.arrayBuffer());
            const page = pdfDoc.getPages()[0];
            const fontColor = PDFLib.rgb(0, 0, 0);
            const txt = (t, x, y, s = 11) => { if(t && t !== '---' && t !== '') page.drawText(t, { x, y, size: s, color: fontColor }); };

            txt(dados.inc, 123, 768);
            txt(dados.uniorg, 64, 714);
            txt(dados.rua, 79, 701, 10);
            txt(dados.num, 300, 702);
            txt(dados.cid, 338, 689);
            txt(dados.uf, 43, 675); 
            txt(dados.bai, 65, 688);

            txt("EQUIPAMENTO INOPERANTE", 30, 555, 11);
            txt(dados.modelo, 69, 457, 11); 
            txt(dados.host, 78, 443, 11);
            txt(dados.patri, 88, 485, 11); 
            txt(dados.sn, 110, 471, 11);

            // MAC (x: 100, y: 430) - Fica em branco se não existir
            txt(dados.mac, 100, 430, 11);
            
            txt(dados.solucao, 30, 232, 11); 

            txt(dados.resp, 95, 174, 11); 
            txt(dados.matricula, 83, 147, 11);

            txt(dados.p.h, 91, 747); txt(dados.p.m, 110, 747);
            txt(dados.p.h ? dados.c.h : '00', 91, 736); txt(dados.p.h ? dados.c.m : '00', 110, 736);
            txt(dados.a.h, 418, 749); txt(dados.a.m, 436, 749);

            const pdfBytes = await pdfDoc.save();
            const loadingTask = pdfjsLib.getDocument({data: pdfBytes});
            const pdf = await loadingTask.promise;
            const pdfPage = await pdf.getPage(1);
            const viewport = pdfPage.getViewport({scale: 2.0}); 
            const canvas = document.getElementById('pdfCanvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await pdfPage.render({canvasContext: context, viewport: viewport}).promise;
            document.getElementById('viewerContainer').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } catch (e) { alert("Erro: " + e.message); } finally { btn.disabled = false; }
    }

    async function salvarAtendimento() {
        const texto = document.getElementById('textoBruto').value.trim();
        if(!texto) return;
        try {
            const { error } = await supabaseClient.from('chamados').insert([{ numero_inc: dados.inc, texto_bruto: texto, analista: 'Willian' }]);
            if (error) throw error;
            alert("Salvo!");
        } catch (e) { alert(e.message); }
    }
</script>
</body>
</html>
