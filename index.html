<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .card-input { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        textarea { width: 100%; height: 80px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: none; }

        .workspace { display: flex; flex-direction: row; gap: 20px; width: 100%; justify-content: center; align-items: flex-start; }
        .editor-box { flex: 1; min-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-box { flex: 1; min-width: 350px; background: #525659; padding: 15px; border-radius: 12px; }

        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .full-width { grid-column: span 2; }
        
        /* Ajuste para evitar distorção no zoom */
        .time-container { grid-column: span 2; display: grid; grid-template-columns: repeat(2, minmax(150px, 1fr)); gap: 20px; }
        .equip-container { grid-column: span 2; display: grid; grid-template-columns: repeat(2, minmax(150px, 1fr)); gap: 20px; }
        
        .column-title { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 3px; }
        .field { display: flex; flex-direction: column; gap: 2px; }
        .field label { font-size: 9px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .field input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; font-weight: bold; text-transform: uppercase; min-width: 0; }
        
        canvas { width: 100% !important; height: auto !important; border-radius: 4px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; color: white; }
        .btn-save { background: var(--primary); }
        .btn-pdf { background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="card-input">
        <h2>1. Cole o Chamado</h2>
        <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="extrairDados()"></textarea>
    </div>

    <div class="workspace">
        <div class="editor-box">
            <h2>2. Editor em Tempo Real</h2>
            <div class="form-grid">
                <div class="field full-width"><label>INC</label><input type="text" id="f_inc"></div>
                
                <div class="time-container">
                    <div>
                        <div class="column-title">Percurso</div>
                        <div class="field"><label>Hora Partida</label><input type="text" id="f_partida" maxlength="5"></div>
                        <div class="field"><label>Hora Chegada</label><input type="text" id="f_chegada" maxlength="5"></div>
                    </div>
                    <div>
                        <div class="column-title">Atendimento</div>
                        <div class="field"><label>Hora Início</label><input type="text" id="f_inicio_ate" maxlength="5"></div>
                        <div class="field"><label>Hora Término</label><input type="text" id="f_termino_ate" maxlength="5"></div>
                    </div>
                </div>

                <div class="field full-width"><label>Uniorg</label><input type="text" id="f_uniorg"></div>
                <div class="field full-width"><label>Endereço</label><input type="text" id="f_rua"></div>
                
                <div class="equip-container">
                    <div>
                        <div class="column-title">Atual / Retirado</div>
                        <div class="field"><label>Patrimônio</label><input type="text" id="f_patri_ret"></div>
                        <div class="field"><label>Série (SN)</label><input type="text" id="f_sn_ret"></div>
                        <div class="field"><label>Modelo</label><input type="text" id="f_modelo_ret"></div>
                        <div class="field"><label>Hostname</label><input type="text" id="f_host_ret"></div>
                        <div class="field"><label>MAC</label><input type="text" id="f_mac_ret"></div>
                    </div>
                    <div>
                        <div class="column-title">Novo / Instalado</div>
                        <div class="field"><label>Patrimônio</label><input type="text" id="f_patri_inst"></div>
                        <div class="field"><label>Série (SN)</label><input type="text" id="f_sn_inst"></div>
                        <div class="field"><label>Modelo</label><input type="text" id="f_modelo_inst"></div>
                        <div class="field"><label>Hostname</label><input type="text" id="f_host_inst"></div>
                        <div class="field"><label>MAC</label><input type="text" id="f_mac_inst"></div>
                    </div>
                </div>
                <div class="field full-width"><label>Solução</label><input type="text" id="f_solucao"></div>
            </div>
            <div class="btn-group">
                <button class="btn-save" onclick="alert('Salvo!')">Salvar</button>
                <button class="btn-pdf" onclick="alert('Download!')">Baixar PDF</button>
            </div>
        </div>
        <div class="preview-box"><canvas id="pdfCanvas"></canvas></div>
    </div>
</div>

<script>
    // Ajuste simples para manter os campos responsivos no zoom
    document.querySelectorAll('input').forEach(i => {
        i.addEventListener('focus', () => window.scrollTo(0, i.offsetTop - 50));
    });
</script>
</body>
</html>
