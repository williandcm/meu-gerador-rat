<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de RAT - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h2 { color: #1e293b; text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; resize: none; box-sizing: border-box; }
        
        .info-painel { display: flex; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; justify-content: space-around; }
        .info-item { text-align: center; flex: 1; }
        .info-label { display: block; font-size: 9px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 14px; color: #1e293b; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 15px; }
        .btn-save { background: #3b82f6; color: white; }
        .btn-pdf { background: #10b981; color: white; }
        
        #pdfViewer { width: 100%; height: 600px; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 10px; }
        #status { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📄 Sistema de RAT Santander</h2>
    
    <textarea id="textoBruto" placeholder="Cole o chamado completo aqui..." oninput="extrairDados()"></textarea>
    
    <div class="info-painel">
        <div class="info-item">
            <span class="info-label">Chamado</span>
            <span id="pInc" class="info-value">---</span>
        </div>
        <div class="info-item" style="border-left: 1px solid #e2e8f0;">
            <span class="info-label">🕒 Partida</span>
            <span class="info-value" id="dispPartida">00:00</span>
        </div>
        <div class="info-item" style="border-left: 1px solid #e2e8f0;">
            <span class="info-label">🏁 Chegada</span>
            <span class="info-value" id="dispChegada">00:00</span>
        </div>
        <div class="info-item" style="border-left: 1px solid #e2e8f0;">
            <span class="info-label">🛠️ Atendim.</span>
            <span class="info-value" id="dispAtendimento">00:00</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="salvarAtendimento()">1. Salvar no Banco</button>
        <button class="btn-pdf" onclick="visualizarRAT()">2. Visualizar RAT Carimbada</button>
    </div>

    <div id="status"></div>

    <div id="previewContainer" style="display:none; width: 100%;">
        <object id="pdfViewer" data="" type="application/pdf"></object>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let dados = { 
        inc: '', 
        partida: { h: '00', m: '00' },
        chegada: { h: '00', m: '00' },
        atendimento: { h: '00', m: '00' }
    };

    function extrairDados() {
        const texto = document.getElementById('textoBruto').value;
        
        // 1. INC
        const mInc = /(INC\d+)/i.exec(texto);
        dados.inc = mInc ? mInc[1].toUpperCase() : "---";
        
        // Função interna para facilitar a busca de horários
        const buscarHora = (label) => {
            const regex = new RegExp(label + "\\s*:\\s*\\d{2}\\/\\d{2}\\/\\d{4}\\s+(\\d{2}):(\\d{2})", "i");
            const match = regex.exec(texto);
            return match ? { h: match[1], m: match[2] } : { h: '00', m: '00' };
        };

        dados.partida = buscarHora("Data de Início");
        dados.chegada = buscarHora("Data de Chegada");
        dados.atendimento = buscarHora("Data de Atendimento");

        document.getElementById('pInc').innerText = dados.inc;
        document.getElementById('dispPartida').innerText = `${dados.partida.h}:${dados.partida.m}`;
        document.getElementById('dispChegada').innerText = `${dados.chegada.h}:${dados.chegada.m}`;
        document.getElementById('dispAtendimento').innerText = `${dados.atendimento.h}:${dados.atendimento.m}`;
    }

    async function salvarAtendimento() {
        const texto = document.getElementById('textoBruto').value.trim();
        if(!texto) return;
        mostrarStatus("⌛ Gravando...", "#e0f2fe");
        try {
            const { error } = await supabaseClient.from('chamados').insert([{ 
                numero_inc: dados.inc, texto_bruto: texto, analista: 'Willian' 
            }]);
            if (error) throw error;
            mostrarStatus("✅ Salvo!", "#dcfce7", 2000);
        } catch (e) { alert(e.message); }
    }

    async function visualizarRAT() {
        try {
            mostrarStatus("⌛ Gerando Preview...", "#e0f2fe");
            const res = await fetch(URL_MODELO_PDF);
            const pdfDoc = await PDFLib.PDFDocument.load(await res.arrayBuffer());
            const page = pdfDoc.getPages()[0];

            // --- RÉGUA DE CALIBRAÇÃO (Remova quando terminar) ---
            for (let i = 0; i <= 600; i += 50) page.drawText(i.toString(), { x: i, y: 10, size: 8, color: PDFLib.rgb(0.7, 0.7, 0.7) });
            for (let i = 0; i <= 850; i += 50) page.drawText(i.toString(), { x: 10, y: i, size: 8, color: PDFLib.rgb(0.7, 0.7, 0.7) });

            // 1. INC
            page.drawText(dados.inc, { x: 123, y: 768, size: 11, color: PDFLib.rgb(0,0,0) });

            // 2. PARTIDA (Data de Início)
            if(dados.partida.h !== "00") {
                page.drawText(dados.partida.h, { x: 235, y: 690, size: 11, color: PDFLib.rgb(0,0,0) });
                page.drawText(dados.partida.m, { x: 265, y: 690, size: 11, color: PDFLib.rgb(0,0,0) });
            }

            // 3. CHEGADA (Data de Chegada)
            if(dados.chegada.h !== "00") {
                page.drawText(dados.chegada.h, { x: 235, y: 650, size: 11, color: PDFLib.rgb(0,0,0) });
                page.drawText(dados.chegada.m, { x: 265, y: 650, size: 11, color: PDFLib.rgb(0,0,0) });
            }

            // 4. ATENDIMENTO (Data de Atendimento)
            if(dados.atendimento.h !== "00") {
                page.drawText(dados.atendimento.h, { 
                    x: 235, // <--- AJUSTAR X HORA ATENDIMENTO
                    y: 610, // <--- AJUSTAR Y HORA ATENDIMENTO
                    size: 11, color: PDFLib.rgb(0,0,0) 
                });
                page.drawText(dados.atendimento.m, { 
                    x: 265, // <--- AJUSTAR X MINUTO ATENDIMENTO
                    y: 610, // <--- AJUSTAR Y MINUTO ATENDIMENTO
                    size: 11, color: PDFLib.rgb(0,0,0) 
                });
            }

            const pdfUrl = URL.createObjectURL(new Blob([await pdfDoc.save()], {type:'application/pdf'}));
            document.getElementById('pdfViewer').data = pdfUrl;
            document.getElementById('previewContainer').style.display = 'block';
            mostrarStatus("✅ Visualização com Régua Pronta!", "#dcfce7", 2000);
        } catch (e) { alert("Erro ao processar PDF"); }
    }

    function mostrarStatus(msg, cor, t=0) {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = cor; s.innerText = msg;
        if(t > 0) setTimeout(() => s.style.display = 'none', t);
    }
</script>
</body>
</html>
