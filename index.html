<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de RAT - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 950px; }
        h2 { color: #1e293b; text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; resize: none; box-sizing: border-box; }
        
        .info-painel { display: flex; gap: 10px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; justify-content: space-around; flex-wrap: wrap; }
        .info-item { text-align: center; min-width: 80px; }
        .info-label { display: block; font-size: 9px; color: #64748b; font-weight: bold; text-transform: uppercase; }
        .info-value { font-size: 13px; color: #1e293b; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 15px; }
        .btn-save { background: #3b82f6; color: white; }
        .btn-pdf { background: #10b981; color: white; }
        
        #previewContainer { display: none; width: 100%; margin-top: 20px; text-align: center; }
        iframe { width: 100%; height: 600px; border: 2px solid #cbd5e1; border-radius: 8px; background: #cbd5e1; }
        .fallback-link { display: inline-block; margin-top: 10px; padding: 12px 24px; background: #ef4444; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        #status { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📄 Sistema de RAT Santander</h2>
    
    <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="extrairDados()"></textarea>
    
    <div class="info-painel">
        <div class="info-item"><span class="info-label">Chamado</span><span id="pInc" class="info-value">---</span></div>
        <div class="info-item"><span class="info-label">Cidade/UF</span><span id="pLocal" class="info-value">---</span></div>
        <div class="info-item"><span class="info-label">Bairro</span><span id="pBairro" class="info-value">---</span></div>
        <div class="info-item"><span class="info-label">🕒 Atend.</span><span id="dispAtendimento" class="info-value">00:00</span></div>
    </div>

    <div class="btn-group">
        <button class="btn-save" id="btnSalvar" onclick="salvarAtendimento()">1. Salvar no Banco</button>
        <button class="btn-pdf" id="btnGerar" onclick="visualizarRAT()">2. Gerar e Abrir RAT</button>
    </div>

    <div id="status"></div>

    <div id="previewContainer">
        <a id="btnFallback" class="fallback-link" target="_blank">Clique aqui se o PDF não carregar abaixo</a>
        <br><br>
        <iframe id="pdfIframe"></iframe>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let blobUrlAtual = null;
    
    let dados = { 
        inc: '', uniorg: '', enderecoRua: '', enderecoNum: '', cidade: '', uf: '', bairro: '', cep: '',
        partida: {h:'00',m:'00'}, chegada: {h:'00',m:'00'}, atendimento: {h:'00',m:'00'} 
    };

    async function extrairDados() {
        const texto = document.getElementById('textoBruto').value;
        if(!texto) return;

        const mInc = /(INC\d+)/i.exec(texto);
        dados.inc = mInc ? mInc[1].toUpperCase() : "---";
        
        const mUniorg = /Uniorg\s*:\s*(\d+)/i.exec(texto);
        dados.uniorg = mUniorg ? mUniorg[1] : "---";

        const mFullEnd = /Endereço\s*:\s*(.+)/i.exec(texto);
        if (mFullEnd) {
            const linhaEnd = mFullEnd[1];
            
            // Rua
            const mRua = /^([^0-9,]+)/.exec(linhaEnd);
            dados.enderecoRua = mRua ? mRua[1].trim() : "---";
            
            // Número
            const mNum = /(\d+)/.exec(linhaEnd.replace(dados.enderecoRua, ""));
            dados.enderecoNum = mNum ? mNum[1] : "---";
            
            // Cidade (entre - e ,)
            const mCid = /-\s*([^,]+)/.exec(linhaEnd);
            dados.cidade = mCid ? mCid[1].trim() : "---";

            // ESTADO (UF) - Pega os 2 caracteres após a vírgula
            const mUf = /,\s*([A-Z]{2})/.exec(linhaEnd);
            dados.uf = mUf ? mUf[1] : "";

            // CEP para Bairro
            const mCep = /(\d{8})/.exec(linhaEnd.replace(/\s/g, ""));
            if (mCep && mCep[1] !== dados.cep) {
                dados.cep = mCep[1];
                buscarBairro(dados.cep);
            }
        }
        
        const regexHora = (label) => new RegExp(label + "\\s*:\\s*\\d{2}\\/\\d{2}\\/\\d{4}\\s+(\\d{2}):(\\d{2})", "i");
        const p = regexHora("Início").exec(texto); if(p) dados.partida = {h:p[1], m:p[2]};
        const c = regexHora("Chegada").exec(texto); if(c) dados.chegada = {h:c[1], m:c[2]};
        const a = regexHora("Atendimento").exec(texto); if(a) dados.atendimento = {h:a[1], m:a[2]};

        atualizarPainel();
    }

    async function buscarBairro(cep) {
        try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if (!data.erro) {
                dados.bairro = data.bairro.toUpperCase();
                document.getElementById('pBairro').innerText = dados.bairro;
            }
        } catch (e) { console.error("Erro CEP"); }
    }

    function atualizarPainel() {
        document.getElementById('pInc').innerText = dados.inc;
        document.getElementById('pLocal').innerText = `${dados.cidade} / ${dados.uf}`;
        document.getElementById('pBairro').innerText = dados.bairro || "---";
        document.getElementById('dispAtendimento').innerText = `${dados.atendimento.h}:${dados.atendimento.m}`;
    }

    async function visualizarRAT() {
        if(!document.getElementById('textoBruto').value) return alert("Cole o chamado!");
        
        const btn = document.getElementById('btnGerar');
        btn.disabled = true;
        
        try {
            mostrarStatus("⌛ Gerando PDF...", "#e0f2fe");
            
            if (blobUrlAtual) URL.revokeObjectURL(blobUrlAtual);

            const response = await fetch(URL_MODELO_PDF + '?v=' + Date.now());
            const pdfDoc = await PDFLib.PDFDocument.load(await response.arrayBuffer());
            const page = pdfDoc.getPages()[0];
            const fontColor = PDFLib.rgb(0, 0, 0);

            // Carimbos
            page.drawText(dados.inc, { x: 123, y: 768, size: 11, color: fontColor });
            if(dados.uniorg !== "---") page.drawText(dados.uniorg, { x: 64, y: 714, size: 11, color: fontColor });
            if(dados.enderecoRua !== "---") page.drawText(dados.enderecoRua, { x: 79, y: 701, size: 10, color: fontColor });
            if(dados.enderecoNum !== "---") page.drawText(dados.enderecoNum, { x: 300, y: 702, size: 11, color: fontColor });
            
            // CIDADE
            if(dados.cidade !== "---") page.drawText(dados.cidade, { x: 338, y: 689, size: 11, color: fontColor });
            
            // ESTADO (UF) - Ajuste as coordenadas X e Y abaixo quando tiver
            if(dados.uf) page.drawText(dados.uf, { x: 480, y: 689, size: 11, color: fontColor });

            // BAIRRO
            if(dados.bairro) page.drawText(dados.bairro, { x: 65, y: 688, size: 11, color: fontColor });

            // Horas
            page.drawText(dados.partida.h, { x: 91, y: 747, size: 11, color: fontColor });
            page.drawText(dados.partida.m, { x: 110, y: 747, size: 11, color: fontColor });
            page.drawText(dados.chegada.h, { x: 91, y: 736, size: 11, color: fontColor });
            page.drawText(dados.chegada.m, { x: 110, y: 736, size: 11, color: fontColor });
            page.drawText(dados.atendimento.h, { x: 418, y: 749, size: 11, color: fontColor });
            page.drawText(dados.atendimento.m, { x: 436, y: 749, size: 11, color: fontColor });

            const pdfBytes = await pdfDoc.save();
            blobUrlAtual = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));

            document.getElementById('pdfIframe').src = blobUrlAtual;
            document.getElementById('btnFallback').href = blobUrlAtual;
            document.getElementById('previewContainer').style.display = 'block';

            mostrarStatus("✅ Pronto!", "#dcfce7", 3000);
            
        } catch (e) { alert("Erro: " + e.message); }
        finally { btn.disabled = false; }
    }

    function mostrarStatus(msg, cor, t=0) {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = cor; s.innerText = msg;
        if(t > 0) setTimeout(() => s.style.display = 'none', t);
    }

    async function salvarAtendimento() {
        const texto = document.getElementById('textoBruto').value.trim();
        if(!texto) return;
        try {
            const { error } = await supabaseClient.from('chamados').insert([{ 
                numero_inc: dados.inc, texto_br
