<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Willian (Tech Edition)</title>
    
    <!-- Fontes Tecnológicas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas base -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* TEMA TECNOLÓGICO / DARK MODE */
        :root { 
            --primary: #00f0ff; /* Ciano Neon */
            --primary-dim: rgba(0, 240, 255, 0.15);
            --success: #00ff88; /* Verde Neon */
            --warning: #ffb700; /* Laranja Neon */
            --danger: #ff003c;  /* Vermelho Alerta */
            --bg: #050b14;      /* Fundo ultra escuro */
            --panel: #0a1325;   /* Fundo dos painéis */
            --border: #1a2a42;  /* Bordas escuras */
            --text-main: #e2e8f0; 
            --text-muted: #64748b;
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body { 
            font-family: 'Titillium Web', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at top right, rgba(0, 240, 255, 0.03), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 255, 136, 0.03), transparent 40%);
            color: var(--text-main); 
            margin: 0; 
            padding: 15px 10px; 
        }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; max-width: 1250px; margin: 0 auto; }
        
        .card-input { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); 
            width: 100%; 
            box-sizing: border-box; 
        }
        
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .search-box { 
            background: linear-gradient(90deg, var(--panel) 0%, #070d1a 100%); 
            border: 1px solid var(--primary-dim); 
            display: flex; gap: 10px; align-items: center; transition: 0.3s; 
            border-left: 3px solid var(--primary);
        }
        
        .search-input { 
            flex: 1; padding: 12px 15px; 
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-size: 16px; font-weight: bold; text-transform: uppercase; 
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            outline: none; transition: 0.2s; 
        }
        .search-input::placeholder { color: #334155; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 12px var(--primary-dim); }
        
        .btn-limpar { 
            background: transparent; color: var(--text-muted); 
            padding: 8px 15px; border: 1px solid var(--border); 
            border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.2s; 
            font-family: 'Titillium Web', sans-serif; text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
        }
        .btn-limpar:hover { background: rgba(255,255,255,0.05); color: white; border-color: var(--text-muted); }

        textarea { 
            width: 100%; height: 80px; padding: 15px; 
            background: #02060d;
            border: 1px solid var(--border); 
            border-radius: 4px; font-size: 15px; 
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            box-sizing: border-box; resize: none; outline: none; transition: 0.2s; 
        }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-dim); }

        .workspace { display: flex; flex-direction: row; gap: 20px; width: 100%; justify-content: center; align-items: flex-start; }
        .editor-box { flex: 1; min-width: 350px; background: var(--panel); padding: 25px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        .preview-wrapper { position: relative; flex: 1; min-width: 350px; }
        .preview-box { background: #121824; padding: 15px; border-radius: 8px; border: 1px dashed var(--border); text-align: center; display: block; width: 100%; box-sizing: border-box; }
        
        .pdf-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 11, 20, 0.85); border-radius: 8px; display: none; flex-direction: column; justify-content: center; align-items: center; color: var(--primary); font-family: 'Share Tech Mono', monospace; font-size: 16px; z-index: 10; backdrop-filter: blur(2px); }
        .spinner { border: 3px solid var(--primary-dim); border-top: 3px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; box-shadow: 0 0 15px var(--primary-dim); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .workspace { flex-direction: column; align-items: center; }
            .editor-box, .preview-wrapper { width: 100%; min-width: unset; }
        }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        
        .equip-container, .time-container { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 5px; }
        .field label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .field input { 
            padding: 10px 12px; 
            background: #02060d; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            font-size: 14px; 
            font-weight: normal; 
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase; width: 100%; box-sizing: border-box; transition: 0.2s; 
        }
        .field input:focus { background: #000; border-color: var(--primary); box-shadow: 0 0 10px var(--primary-dim); outline: none; }
        .field input.is-invalid { border-color: var(--danger) !important; box-shadow: 0 0 10px rgba(255, 0, 60, 0.2) !important; color: var(--danger); }
        
        /* Input de Horas customizado */
        .time-input-group { display: flex; gap: 5px; }
        .field input.time-input { text-align: center; font-size: 16px; letter-spacing: 2px; flex: 1; }
        .btn-agora { 
            background: var(--border); border: 1px solid var(--border); color: var(--text-muted);
            border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; transition: 0.2s; font-size: 14px; 
        }
        .btn-agora:hover { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }

        canvas { width: 100% !important; height: auto !important; border-radius: 4px; box-shadow: 0 5px 25px rgba(0,0,0,0.8); }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }
        button { 
            flex: 1; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; border: 1px solid; transition: 0.3s; font-size: 13px; 
            font-family: 'Titillium Web', sans-serif; text-transform: uppercase; letter-spacing: 2px;
            background: transparent;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-save { color: var(--primary); border-color: var(--primary); }
        .btn-save:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-dim); }
        
        .btn-update { color: var(--warning); border-color: var(--warning); } 
        .btn-update:hover { background: var(--warning); color: #000; box-shadow: 0 0 20px rgba(255, 183, 0, 0.2); }
        
        .btn-pdf { color: var(--success); border-color: var(--success); }
        .btn-pdf:hover { background: var(--success); color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        
        h2 { 
            font-size: 1.1rem; color: var(--text-main); margin: 0 0 15px 0; padding-bottom: 8px; 
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        
        .column-title span { color: var(--text-main); font-family: 'Titillium Web', sans-serif; }
    </style>
</head>
<body>

<div class="container">
    <!-- Seção de Pesquisa Inteligente -->
    <div class="card-input search-box">
        <div style="flex: 1;">
            <div class="header-tools">
                <h2 style="border: none; margin: 0; color: var(--primary);">SYS.SEARCH // BUSCA DE CHAMADO</h2>
                <button class="btn-limpar" onclick="limparTudo()" title="Limpar formulário">[ LIMPAR_DADOS ]</button>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <!-- oninput com debounce para buscar automaticamente -->
                <input type="text" id="busca_inc" class="search-input" placeholder="DIGITE O INC PARA BUSCA AUTOMÁTICA..." oninput="debounceBusca()">
            </div>
        </div>
    </div>

    <div class="card-input">
        <h2>[1] RAW_DATA // NOVO CHAMADO</h2>
        <textarea id="chamado_cerb" placeholder="COLE O CONTEÚDO BRUTO DO CHAMADO AQUI..." oninput="extrairDados()"></textarea>
    </div>

    <div class="workspace">
        <div class="editor-box" id="editorBox">
            <h2>[2] DATA_EDITOR // TEMPO REAL <span id="modo_edicao_label" style="color: var(--warning); font-size: 11px; display: none; letter-spacing: 2px;">[ MODO_EDIÇÃO ]</span></h2>
            <div class="form-grid">
                <div class="field full-width">
                    <label>Chamado *</label>
                    <input type="text" id="f_inc" oninput="removerErro(this)">
                </div>
                
                <div class="time-container">
                    <div class="field">
                        <label>Hora Partida</label>
                        <div class="time-input-group">
                            <input type="text" id="f_partida" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)">
                            <button class="btn-agora" onclick="preencherHoraAgora('f_partida')" title="Inserir hora atual">🕒</button>
                        </div>
                    </div>
                    <div class="field">
                        <label>Hora Chegada</label>
                        <div class="time-input-group">
                            <input type="text" id="f_chegada" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)">
                            <button class="btn-agora" onclick="preencherHoraAgora('f_chegada')" title="Inserir hora atual">🕒</button>
                        </div>
                    </div>
                    <div class="field">
                        <label>Hora Início Atend.</label>
                        <div class="time-input-group">
                            <input type="text" id="f_inicio_ate" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)">
                            <button class="btn-agora" onclick="preencherHoraAgora('f_inicio_ate')" title="Inserir hora atual">🕒</button>
                        </div>
                    </div>
                    <div class="field">
                        <label>Hora Término Atend.</label>
                        <div class="time-input-group">
                            <input type="text" id="f_termino_ate" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)">
                            <button class="btn-agora" onclick="preencherHoraAgora('f_termino_ate')" title="Inserir hora atual">🕒</button>
                        </div>
                    </div>
                </div>

                <div class="field full-width"><label>Uniorg</label><input type="text" id="f_uniorg"></div>
                <div class="field full-width"><label>Endereço</label><input type="text" id="f_rua"></div>
                
                <div class="field"><label>Número</label><input type="text" id="f_num"></div>
                <div class="field"><label>Bairro</label><input type="text" id="f_bai"></div>
                <div class="field"><label>Cidade</label><input type="text" id="f_cid"></div>
                <div class="field"><label>UF</label><input type="text" id="f_uf"></div>
                
                <div class="field full-width"><label>Descritivo Defeito / Solução</label><input type="text" id="f_descritivo_defeito" value="EQUIPAMENTO INOPERANTE"></div>
                
                <div class="equip-container">
                    <div>
                        <div class="column-title" style="font-size: 13px; text-transform: uppercase; margin-bottom: 15px; line-height: 1.4; text-align: center; min-height: 50px; display: flex; flex-direction: column; justify-content: flex-end; border-bottom: 1px dashed var(--border); padding-bottom: 5px;">
                            <span style="color: var(--primary);">RETIRADO / RECONFIGURADO</span>
                        </div>
                        <div class="field"><label>Patrimônio (SGPI)</label><input type="text" id="f_patri_ret"></div>
                        <div class="field"><label>Série (SN)</label><input type="text" id="f_sn_ret"></div>
                        <div class="field"><label>Modelo</label><input type="text" id="f_modelo_ret"></div>
                        <div class="field"><label>Hostname</label><input type="text" id="f_host_ret"></div>
                        <div class="field"><label>MAC</label><input type="text" id="f_mac_ret" oninput="sincronizarMac()"></div>
                    </div>
                    <div>
                        <div class="column-title" style="font-size: 13px; text-transform: uppercase; margin-bottom: 15px; line-height: 1.4; text-align: center; min-height: 50px; display: flex; flex-direction: column; justify-content: flex-end; border-bottom: 1px dashed var(--border); padding-bottom: 5px;">
                            <span style="color: var(--success);">EQUIPAMENTO NOVO / TROCA</span>
                        </div>
                        <div class="field"><label>Patrimônio (SGPI)</label><input type="text" id="f_patri_inst"></div>
                        <div class="field"><label>Série (SN)</label><input type="text" id="f_sn_inst"></div>
                        <div class="field"><label>Modelo</label><input type="text" id="f_modelo_inst"></div>
                        <div class="field"><label>Hostname</label><input type="text" id="f_host_inst"></div>
                        <div class="field"><label>MAC</label><input type="text" id="f_mac_inst"></div>
                    </div>
                </div>

                <div class="field full-width"><label>Solução</label><input type="text" id="f_solucao" oninput="sincronizarMac()"></div>
                <div class="field"><label>Responsável</label><input type="text" id="f_resp"></div>
                <div class="field"><label>Matrícula</label><input type="text" id="f_matricula"></div>
                <div class="field"><label>Local</label><input type="text" id="f_local_data_cidade"></div>
                <div class="field"><label>Data</label><input type="date" id="f_data_picker" onchange="atualizarDataFormatada()" style="color: var(--primary);"></div>
                <input type="hidden" id="f_data_completa">
            </div>
            <div class="btn-group">
                <button class="btn-save" id="btnSalvar" onclick="salvarAtendimento()" title="Atalho: Ctrl + S">DB.SAVE()</button>
                <button class="btn-pdf" onclick="baixarPdf()" title="Atalho: Ctrl + P">EXPORT.PDF()</button>
            </div>
        </div>

        <div class="preview-wrapper">
            <div class="pdf-overlay" id="pdf-loading">
                <div class="spinner"></div>
                RENDERING_PDF...
            </div>
            <div class="preview-box" id="previewBox">
                <span style="color:var(--text-muted); font-family: 'Share Tech Mono'; font-size: 11px; letter-spacing: 2px; margin-bottom: 10px; display: block;">&lt; PREVIEW_RENDER &gt;</span>
                <canvas id="pdfCanvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Configurações Iniciais ---
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';
    const CPF_FIXO = "327.190.648-31";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Configuração dos Toasts (SweetAlert2) - ADAPTADO PARA DARK THEME
    const Toast = Swal.mixin({
        toast: true, position: 'top-end', showConfirmButton: false, timer: 3000,
        timerProgressBar: true, 
        background: '#0a1325', color: '#00f0ff', 
        customClass: { popup: 'tech-toast' },
        didOpen: (toast) => { toast.addEventListener('mouseenter', Swal.stopTimer); toast.addEventListener('mouseleave', Swal.resumeTimer); }
    });

    const POS = {
        inc: { x: 123, y: 768 }, uniorg: { x: 64, y: 714 }, rua: { x: 79, y: 701, s: 10 }, 
        num: { x: 300, y: 702 }, cid: { x: 338, y: 689 }, uf: { x: 43, y: 675 },
        bai: { x: 65, y: 688 }, inoperante: { x: 30, y: 555 }, modelo: { x: 69, y: 457 },
        host: { x: 78, y: 443 }, patri: { x: 88, y: 485 }, sn: { x: 110, y: 471 },
        mac: { x: 91, y: 430 }, solucao: { x: 30, y: 232 }, resp: { x: 95, y: 174 },
        matri: { x: 83, y: 147 }, tecnico: { x: 347, y: 176 }, cpf: { x: 346, y: 149 },
        local: { x: 123, y: 56 }, dia: { x: 376, y: 58 }, mes: { x: 410, y: 58 }, ano: { x: 441, y: 58 },
        h_partida: { x: 91, y: 747 }, m_partida: { x: 110, y: 747 },
        h_chegada: { x: 91, y: 736 }, m_chegada: { x: 110, y: 736 },
        h_inicio_ate: { x: 418, y: 749 }, m_inicio_ate: { x: 436, y: 749 },
        h_termino_ate: { x: 418, y: 738 }, m_termino_ate: { x: 436, y: 738 },
        patri_inst: { x: 349, y: 486, s: 11 }, sn_inst: { x: 372, y: 473, s: 11 },
        modelo_inst: { x: 334, y: 458, s: 11 }, host_inst: { x: 342, y: 445, s: 11 }, mac_inst: { x: 356, y: 431, s: 11 }
    };

    let dados = { tecnico: 'WILLIAN DO CARMO MORAIS', cpf: CPF_FIXO };
    let modeloPdfBytes = null;
    let timeoutRender = null;
    let timeoutBusca = null;
    let idRegistroAtual = null; 
    let hasUnsavedChanges = false;

    // --- Inicialização ---
    window.onload = async () => {
        try {
            const response = await fetch(URL_MODELO_PDF + '?v=' + Date.now());
            modeloPdfBytes = await response.arrayBuffer();
            const d = new Date();
            document.getElementById('f_data_picker').value = d.toISOString().split('T')[0];
            atualizarDataFormatada();
            
            document.getElementById('editorBox').addEventListener('input', (e) => {
                hasUnsavedChanges = true;
                salvarRascunho(); 
                clearTimeout(timeoutRender);
                timeoutRender = setTimeout(gerarERenderizar, 700); 
            });

            carregarRascunho();

        } catch (e) { console.error("Erro ao carregar o PDF base:", e); }
    };

    // --- Atalhos de Teclado & Aviso de Saída ---
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); salvarAtendimento(); }
        if (e.ctrlKey && e.key === 'p') { e.preventDefault(); baixarPdf(); }
    });

    window.addEventListener('beforeunload', function (e) {
        if (hasUnsavedChanges) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // --- Sistema de Rascunho Offline (LocalStorage) ---
    function salvarRascunho() {
        const inputs = document.querySelectorAll('#editorBox input');
        const rascunho = {};
        inputs.forEach(input => rascunho[input.id] = input.value);
        localStorage.setItem('rat_rascunho_willian', JSON.stringify(rascunho));
    }

    function carregarRascunho() {
        const salvo = localStorage.getItem('rat_rascunho_willian');
        if (salvo && !idRegistroAtual) { 
            const rascunho = JSON.parse(salvo);
            for (const key in rascunho) {
                if (document.getElementById(key) && key !== 'busca_inc') {
                    document.getElementById(key).value = rascunho[key];
                }
            }
            if (rascunho['f_inc']) {
                Toast.fire({ icon: 'info', title: 'SYS: Rascunho recuperado' });
                hasUnsavedChanges = true;
                gerarERenderizar();
            }
        }
    }

    function limparTudo() {
        Swal.fire({
            title: 'WIPE_DATA()?',
            text: "Deseja purgar os dados e iniciar formulário limpo?",
            icon: 'warning', showCancelButton: true, 
            background: '#0a1325', color: '#e2e8f0',
            confirmButtonColor: '#ff003c', cancelButtonColor: '#1a2a42', 
            confirmButtonText: 'SIM, PURGAR', cancelButtonText: 'CANCELAR'
        }).then((result) => {
            if (result.isConfirmed) {
                document.querySelectorAll('input').forEach(i => i.value = '');
                document.getElementById('f_descritivo_defeito').value = 'EQUIPAMENTO INOPERANTE';
                document.getElementById('chamado_cerb').value = '';
                const d = new Date();
                document.getElementById('f_data_picker').value = d.toISOString().split('T')[0];
                atualizarDataFormatada();
                localStorage.removeItem('rat_rascunho_willian');
                hasUnsavedChanges = false;
                resetarModoEdicao();
                gerarERenderizar();
                document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                Toast.fire({ icon: 'success', title: 'SYS: Memória limpa' });
            }
        })
    }

    // --- UX: Preencher Hora Atual ---
    function preencherHoraAgora(idCampo) {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        document.getElementById(idCampo).value = `${hh}:${mm}`;
        hasUnsavedChanges = true;
        salvarRascunho();
        gerarERenderizar();
    }

    // --- UX: Busca Automática (Debounce) ---
    function debounceBusca() {
        clearTimeout(timeoutBusca);
        const inputBusca = document.getElementById('busca_inc').value.toUpperCase().trim();
        if (inputBusca.length >= 6 && inputBusca.includes('INC')) {
            timeoutBusca = setTimeout(() => { buscarChamado(); }, 800);
        }
    }

    async function buscarChamado() {
        const incBusca = document.getElementById('busca_inc').value.toUpperCase().trim();
        if (!incBusca) return;

        Toast.fire({ icon: 'info', title: 'SYS: Consultando DB...' });

        try {
            const { data, error } = await supabaseClient.from('chamados').select('*').eq('chamado', incBusca).single(); 

            if (error || !data) {
                Toast.fire({ icon: 'error', title: 'ERR: Chamado inexistente' });
                return;
            }

            idRegistroAtual = data.id;
            document.getElementById('modo_edicao_label').style.display = 'inline';
            const btnSalvar = document.getElementById('btnSalvar');
            btnSalvar.innerHTML = "DB.UPDATE()";
            btnSalvar.classList.remove('btn-save'); btnSalvar.classList.add('btn-update');

            const campos = ['f_inc', 'f_uniorg', 'f_partida', 'f_chegada', 'f_inicio_ate', 'f_termino_ate', 'f_rua', 'f_num', 'f_bai', 'f_cid', 'f_uf', 'f_patri_ret', 'f_sn_ret', 'f_modelo_ret', 'f_host_ret', 'f_mac_ret', 'f_patri_inst', 'f_sn_inst', 'f_modelo_inst', 'f_host_inst', 'f_mac_inst', 'f_solucao', 'f_resp', 'f_matricula'];
            const mapeamentoBD = {
                f_inc: 'chamado', f_rua: 'endereco', f_num: 'numero', f_bai: 'bairro', f_cid: 'cidade', f_resp: 'responsavel'
            };

            campos.forEach(id => {
                const dbKey = mapeamentoBD[id] || id.replace('f_', '');
                if(data[dbKey]) document.getElementById(id).value = data[dbKey];
            });

            document.getElementById('f_descritivo_defeito').value = data.descritivo_defeito_causa || 'EQUIPAMENTO INOPERANTE';
            document.getElementById('f_local_data_cidade').value = data.cidade || '';

            if (data.data_atendimento) { 
                const partes = data.data_atendimento.split('/');
                if (partes.length === 3) {
                    document.getElementById('f_data_picker').value = `${partes[2]}-${partes[1]}-${partes[0]}`;
                    document.getElementById('f_data_completa').value = data.data_atendimento;
                }
            }

            if (data.chamado_cerb) document.getElementById('chamado_cerb').value = data.chamado_cerb;

            hasUnsavedChanges = false;
            Toast.fire({ icon: 'success', title: 'SYS: Dados importados!' });
            gerarERenderizar();

        } catch (e) { console.error(e); }
    }

    function resetarModoEdicao() {
        idRegistroAtual = null;
        document.getElementById('modo_edicao_label').style.display = 'none';
        const btnSalvar = document.getElementById('btnSalvar');
        btnSalvar.innerHTML = "DB.SAVE()";
        btnSalvar.classList.remove('btn-update'); btnSalvar.classList.add('btn-save');
    }

    function removerErro(el) { el.classList.remove('is-invalid'); }

    // --- Utilitários de Extração e Formatação ---
    function atualizarDataFormatada() {
        const picker = document.getElementById('f_data_picker').value;
        if (!picker) return;
        const [ano, mes, dia] = picker.split('-');
        document.getElementById('f_data_completa').value = `${dia}/${mes}/${ano}`;
        hasUnsavedChanges = true;
        gerarERenderizar();
    }

    function sincronizarMac() {
        const solucao = document.getElementById('f_solucao').value.toUpperCase();
        if(solucao.includes("PIN PAD")) document.getElementById('f_mac_inst').value = document.getElementById('f_mac_ret').value;
    }

    function mascaraHora(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length > 2) v = v.slice(0, 2) + ":" + v.slice(2, 4);
        input.value = v;
    }

    function medirLarguraTexto(texto) {
        const c = document.createElement("canvas").getContext("2d");
        c.font = "bold 11px Arial"; return c.measureText(texto.toUpperCase()).width;
    }

    function limitarNomeresponsavel(nome) {
        let partes = nome.split(' ').filter(p => !(['da', 'de', 'do', 'das', 'dos'].includes(p.toLowerCase())));
        while (partes.length > 1 && medirLarguraTexto(partes.join(' ')) > 155) partes.pop();
        return partes.join(' ').toUpperCase();
    }

    async function buscarBairro(cep) {
        try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if (!data.erro) {
                document.getElementById('f_bai').value = data.bairro.toUpperCase();
                document.getElementById('f_local_data_cidade').value = data.localidade.toUpperCase();
                gerarERenderizar();
            }
        } catch (e) {}
    }

    async function extrairDados() {
        const textoInput = document.getElementById('chamado_cerb').value;
        if(!textoInput) return;
        resetarModoEdicao(); 
        hasUnsavedChanges = true;

        const texto = textoInput.toUpperCase();
        dados.inc = (/(INC\d+)/i.exec(texto) || ["",""])[1];
        dados.patri = (/SGPI\s*:\s*(\d+)/i.exec(texto) || ["",""])[1];
        dados.host = (/HOSTNAME\s*:\s*(\S+)/i.exec(texto) || ["",""])[1];
        dados.mac = (/MAC\s*:\s*(\S+)/i.exec(texto) || ["",""])[1];
        dados.matricula = (/MATRÍCULA\s*:\s*(\d+)/i.exec(texto) || ["",""])[1];

        if (texto.includes("PIN PAD")) {
            dados.sn = ''; dados.solucao = "REALIZADO A SUBSTITUIÇÃO DO PIN PAD"; dados.modelo = ""; 
            document.getElementById('f_patri_inst').value = dados.patri; document.getElementById('f_host_inst').value = dados.host; document.getElementById('f_mac_inst').value = dados.mac;
        } else {
            dados.sn = (/(?:SN|SERIAL)\s*:\s*(\S+)/i.exec(texto) || ["",""])[1];
            dados.solucao = texto.includes("BAIXA DE IMAGEM") ? "REALIZADO A BAIXA DE IMAGEM" : "REALIZADO MANUTENÇÃO PREVENTIVA/CORRETIVA";
            dados.modelo = dados.sn.startsWith('P') ? "LENOVO T14" : (dados.sn.startsWith('B') ? "HP ELITEBOOK 640 G9" : "");
            document.getElementById('f_patri_inst').value = ""; document.getElementById('f_host_inst').value = ""; document.getElementById('f_mac_inst').value = "";
        }

        let nomeCapturado = (/solicitante\s*:\s*(.+)/i.exec(texto) || ["",""])[1].trim();
        dados.resp = limitarNomeresponsavel(nomeCapturado);
        dados.uniorg = (/UNIORG\s*:\s*(\d+)/i.exec(texto) || ["",""])[1];

        const mFullEnd = /ENDEREÇO\s*:\s*(.+)/i.exec(texto);
        if (mFullEnd) {
            const inlineEnd = mFullEnd[1];
            dados.rua = (/^([^0-9,]+)/.exec(inlineEnd) || ["",""])[1].trim();
            dados.num = (/(\d+)/.exec(inlineEnd.replace(dados.rua, "")) || ["",""])[1];
            dados.cid = (/-\s*([^,]+)/.exec(inlineEnd) || ["",""])[1].trim().toUpperCase();
            dados.uf = (/,\s*([A-Z]{2})/.exec(inlineEnd) || ["",""])[1];
            const mCep = /(\d{8})/.exec(inlineEnd.replace(/\s/g, ""));
            if (mCep) buscarBairro(mCep[1]);
        }

        const reg = (l) => new RegExp(l + "\\s*:\\s*\\d{2}\\/\\d{2}\\/\\d{4}\\s+(\\d{2}):(\\d{2})", "i").exec(texto);
        const partida = reg("PARTIDA") || reg("INÍCIO"); const chegada = reg("CHEGADA"); const termino = reg("ATENDIMENTO");
        const terminoTotal = reg("TÉRMINO") || reg("FIM") || reg("CONCLUÍDO");

        document.getElementById('f_partida').value = partida ? `${partida[1]}:${partida[2]}` : '';
        document.getElementById('f_chegada').value = chegada ? `${chegada[1]}:${chegada[2]}` : '';
        document.getElementById('f_inicio_ate').value = termino ? `${termino[1]}:${termino[2]}` : '';
        document.getElementById('f_termino_ate').value = terminoTotal ? `${terminoTotal[1]}:${terminoTotal[2]}` : '';

        document.getElementById('f_inc').value = dados.inc;
        document.getElementById('f_uniorg').value = dados.uniorg;
        document.getElementById('f_rua').value = dados.rua || '';
        document.getElementById('f_num').value = dados.num || '';
        document.getElementById('f_cid').value = dados.cid || '';
        document.getElementById('f_uf').value = dados.uf || '';
        document.getElementById('f_patri_ret').value = dados.patri;
        document.getElementById('f_host_ret').value = dados.host;
        document.getElementById('f_sn_ret').value = dados.sn;
        document.getElementById('f_mac_ret').value = dados.mac;
        document.getElementById('f_modelo_ret').value = dados.modelo;
        document.getElementById('f_resp').value = dados.resp;
        document.getElementById('f_matricula').value = dados.matricula;
        document.getElementById('f_solucao').value = dados.solucao;
        document.getElementById('f_local_data_cidade').value = dados.cid || '';
        document.getElementById('f_descritivo_defeito').value = "EQUIPAMENTO INOPERANTE";
        
        salvarRascunho();
        clearTimeout(timeoutRender);
        timeoutRender = setTimeout(gerarERenderizar, 500);
    }

    // --- Geração de PDF ---
    async function aplicarDadosNoPdf() {
        if (!modeloPdfBytes) return null;
        const pdfDoc = await PDFLib.PDFDocument.load(modeloPdfBytes);
        const page = pdfDoc.getPages()[0];
        const fontColor = PDFLib.rgb(0, 0, 0);

        const escrever = (id, config) => {
            const texto = document.getElementById(id).value;
            if(texto && texto !== '---') page.drawText(String(texto).toUpperCase(), { x: config.x, y: config.y, size: config.s || 11, color: fontColor });
        };
        const escreverParHorario = (id, ph, pm) => {
            const v = document.getElementById(id).value.replace(":", "");
            if (v.length >= 2) page.drawText(v.slice(0, 2), { x: ph.x, y: ph.y, size: 11, color: fontColor });
            if (v.length === 4) page.drawText(v.slice(2, 4), { x: pm.x, y: pm.y, size: 11, color: fontColor });
        };

        escrever('f_inc', POS.inc); escrever('f_uniorg', POS.uniorg); escrever('f_rua', POS.rua);
        escrever('f_num', POS.num); escrever('f_cid', POS.cid); escrever('f_uf', POS.uf); escrever('f_bai', POS.bai);
        page.drawText("EQUIPAMENTO INOPERANTE", { x: 30, y: 555, size: 11, color: fontColor });
        escrever('f_modelo_ret', POS.modelo); escrever('f_host_ret', POS.host); escrever('f_patri_ret', POS.patri);
        escrever('f_patri_inst', POS.patri_inst); escrever('f_sn_inst', POS.sn_inst); escrever('f_modelo_inst', POS.modelo_inst);
        escrever('f_host_inst', POS.host_inst); escrever('f_mac_inst', POS.mac_inst);
        escrever('f_sn_ret', POS.sn); escrever('f_mac_ret', POS.mac); escrever('f_solucao', POS.solucao);
        escrever('f_resp', POS.resp); escrever('f_matricula', POS.matri);
        page.drawText(dados.tecnico, { x: POS.tecnico.x, y: 176, size: 11, color: fontColor });
        page.drawText(dados.cpf, { x: POS.cpf.x, y: 149, size: 11, color: fontColor }); 
        
        const dataStr = document.getElementById('f_data_completa').value.split('/');
        if(dataStr.length === 3) {
            page.drawText(dataStr[0], { x: POS.dia.x, y: 58, size: 11, color: fontColor }); 
            page.drawText(dataStr[1], { x: POS.mes.x, y: 58, size: 11, color: fontColor }); 
            page.drawText(dataStr[2], { x: POS.ano.x, y: 58, size: 11, color: fontColor }); 
        }
        
        escrever('f_local_data_cidade', POS.local);
        escreverParHorario('f_partida', POS.h_partida, POS.m_partida); escreverParHorario('f_chegada', POS.h_chegada, POS.m_chegada);
        escreverParHorario('f_inicio_ate', POS.h_inicio_ate, POS.m_inicio_ate); escreverParHorario('f_termino_ate', POS.h_termino_ate, POS.m_termino_ate); 
        return pdfDoc;
    }

    async function gerarERenderizar() {
        document.getElementById('pdf-loading').style.display = 'flex'; 
        try {
            const pdfDoc = await aplicarDadosNoPdf();
            if (!pdfDoc) return;
            const pdfBytes = await pdfDoc.save();
            const pdf = await pdfjsLib.getDocument({data: pdfBytes}).promise;
            const pdfPage = await pdf.getPage(1);
            const viewport = pdfPage.getViewport({scale: 2.0}); 
            const canvas = document.getElementById('pdfCanvas');
            canvas.height = viewport.height; canvas.width = viewport.width;
            await pdfPage.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
        } finally {
            document.getElementById('pdf-loading').style.display = 'none'; 
        }
    }

    async function baixarPdf() {
        const inc = document.getElementById('f_inc').value;
        const pdfDoc = await aplicarDadosNoPdf();
        if (!pdfDoc) return;
        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `RAT_${inc || 'Nova'}.pdf`;
        link.click();
        Toast.fire({ icon: 'success', title: 'SYS: Arquivo PDF Gerado' });
    }

    // --- Salvamento no Supabase ---
    async function salvarAtendimento() {
        const incInput = document.getElementById('f_inc');
        const inc = incInput.value.toUpperCase();
        
        if(!inc) { 
            incInput.classList.add('is-invalid');
            incInput.focus();
            Toast.fire({ icon: 'error', title: 'ERR: ID do Chamado Vazio!' });
            return; 
        }

        const btnSave = document.getElementById('btnSalvar');
        const txtOriginal = btnSave.innerHTML;
        btnSave.innerHTML = "UPLOADING...";
        btnSave.disabled = true;

        try {
            let pdfBase64 = null;
            const pdfDoc = await aplicarDadosNoPdf();
            if (pdfDoc) {
                const pdfBytes = await pdfDoc.save();
                let binary = ''; const bytes = new Uint8Array(pdfBytes);
                for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
                pdfBase64 = window.btoa(binary);
            }

            const dadosParaSalvar = {
                chamado: inc, uniorg: document.getElementById('f_uniorg').value,
                hora_partida: document.getElementById('f_partida').value, hora_chegada: document.getElementById('f_chegada').value,
                hora_inicio_ate: document.getElementById('f_inicio_ate').value, hora_termino_ate: document.getElementById('f_termino_ate').value,
                endereco: document.getElementById('f_rua').value, numero: document.getElementById('f_num').value,
                bairro: document.getElementById('f_bai').value, cidade: document.getElementById('f_cid').value, uf: document.getElementById('f_uf').value,
                descritivo_defeito_causa: document.getElementById('f_descritivo_defeito').value,
                patri_ret: document.getElementById('f_patri_ret').value, sn_ret: document.getElementById('f_sn_ret').value,
                modelo_ret: document.getElementById('f_modelo_ret').value, host_ret: document.getElementById('f_host_ret').value, mac_ret: document.getElementById('f_mac_ret').value,
                patri_inst: document.getElementById('f_patri_inst').value, sn_inst: document.getElementById('f_sn_inst').value,
                modelo_inst: document.getElementById('f_modelo_inst').value, host_inst: document.getElementById('f_host_inst').value, mac_inst: document.getElementById('f_mac_inst').value,
                solucao: document.getElementById('f_solucao').value, responsavel: document.getElementById('f_resp').value,
                matricula: document.getElementById('f_matricula').value, data_atendimento: document.getElementById('f_data_completa').value,
                chamado_cerb: document.getElementById('chamado_cerb').value, tecnico: 'Willian', pdf_base64: pdfBase64 
            };

            if (idRegistroAtual !== null) {
                const { error } = await supabaseClient.from('chamados').update(dadosParaSalvar).eq('id', idRegistroAtual);
                if (error) throw error;
                Swal.fire({ title: 'DB.UPDATE()', text: 'Registro atualizado no Supabase.', icon: 'success', background: '#0a1325', color: '#00f0ff', confirmButtonColor: '#00f0ff' });
            } else {
                const { error } = await supabaseClient.from('chamados').insert([dadosParaSalvar]);
                if (error) throw error;
                Swal.fire({ title: 'DB.INSERT()', text: 'Novo registro salvo no Supabase.', icon: 'success', background: '#0a1325', color: '#00f0ff', confirmButtonColor: '#00f0ff' });
            }
            
            hasUnsavedChanges = false;
            localStorage.removeItem('rat_rascunho_willian');

        } catch (e) { 
            console.error(e);
            Swal.fire({ title: 'ERR_UPLOAD', text: e.message, icon: 'error', background: '#0a1325', color: '#ff003c', confirmButtonColor: '#ff003c' });
        } finally {
            btnSave.innerHTML = txtOriginal;
            btnSave.disabled = false;
        }
    }
</script>
