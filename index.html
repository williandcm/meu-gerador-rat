<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de RAT - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 650px; }
        h2 { color: #1e293b; text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; resize: none; box-sizing: border-box; font-size: 14px; }
        #previewContainer { display: none; background: #ffffff; border: 2px dashed #cbd5e1; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .preview-text { font-family: monospace; font-size: 13px; background: #f8fafc; padding: 10px; border-radius: 4px; white-space: pre-wrap; max-height: 100px; overflow-y: auto; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 15px; }
        .btn-save { background: #3b82f6; color: white; }
        .btn-pdf { background: #10b981; color: white; display: none; }
        #status { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>📄 Gerador de RAT</h2>
    <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="mostrarPreview()"></textarea>
    
    <div id="previewContainer">
        <div style="font-size: 11px; color: #3b82f6; font-weight: bold;">PRÉ-VISUALIZAÇÃO:</div>
        <div style="font-size: 16px; font-weight: bold; margin: 5px 0;">INC: <span id="pInc">---</span></div>
        <div id="pTexto" class="preview-text"></div>
    </div>

    <div class="btn-group">
        <button id="btnSave" class="btn-save" onclick="processarRAT()">1. Salvar Atendimento</button>
        <button id="btnDownload" class="btn-pdf" onclick="carimbarPDF()">2. Gerar PDF Carimbado</button>
    </div>
    <div id="status"></div>
</div>

<script>
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let numeroIncAtual = '';

    function mostrarPreview() {
        const texto = document.getElementById('textoBruto').value.trim();
        const container = document.getElementById('previewContainer');
        if (texto.length > 5) {
            const match = /(INC\d+)/i.exec(texto);
            numeroIncAtual = match ? match[1].toUpperCase() : "NÃO IDENTIFICADO";
            document.getElementById('pInc').innerText = numeroIncAtual;
            document.getElementById('pTexto').innerText = texto;
            container.style.display = 'block';
        } else { container.style.display = 'none'; }
    }

    async function processarRAT() {
        const texto = document.getElementById('textoBruto').value.trim();
        if(!texto) return alert("Cole o texto primeiro!");

        mostrarStatus("⌛ Tentando salvar...", "#e0f2fe");

        try {
            // Tenta inserir os dados
            const { error } = await supabaseClient
                .from('chamados')
                .insert([{ 
                    numero_inc: numeroIncAtual, 
                    texto_bruto: texto, 
                    analista: 'Willian' 
                }]);

            if (error) {
                console.error(error);
                alert("ERRO DO SUPABASE: " + error.message);
                mostrarStatus("❌ Falha ao salvar", "#fee2e2");
            } else {
                document.getElementById('btnDownload').style.display = 'block';
                mostrarStatus("✅ Salvo com sucesso!", "#dcfce7");
            }
        } catch (err) {
            alert("ERRO CRÍTICO: " + err.message);
        }
    }

    async function carimbarPDF() {
        try {
            mostrarStatus("⌛ Gerando PDF...", "#e0f2fe");
            const response = await fetch(URL_MODELO_PDF);
            const bytes = await response.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(bytes);
            const firstPage = pdfDoc.getPages()[0];

            firstPage.drawText(numeroIncAtual, { x: 123, y: 768, size: 11, color: PDFLib.rgb(0, 0, 0) });

            const pdfBytes = await pdfDoc.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
            link.download = `RAT_${numeroIncAtual}.pdf`;
            link.click();
            mostrarStatus("✅ Pronto!", "#dcfce7", 3000);
        } catch (e) { alert("Erro no PDF: " + e.message); }
    }

    function mostrarStatus(msg, cor, t=0) {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = cor; s.innerText = msg;
        if(t > 0) setTimeout(() => s.style.display = 'none', t);
    }
</script>
</body>
</html>
