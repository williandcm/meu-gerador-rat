<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        
        /* Entrada de texto */
        .card-input { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        textarea { width: 100%; height: 80px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: none; outline: none; }

        /* Layout Responsivo */
        .workspace { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; justify-content: center; }

        /* Formulário */
        .editor-box { flex: 1; min-width: 320px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .field { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }
        .field label { font-size: 9px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .field input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px; background: #f8fafc; font-weight: bold; }

        /* PDF Preview */
        .preview-box { flex: 1; min-width: 320px; background: #525659; padding: 15px; border-radius: 12px; text-align: center; display: none; }
        canvas { width: 100% !important; height: auto !important; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; font-size: 14px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-pdf { background: var(--success); color: white; }
        
        h2 { font-size: 1rem; color: #1e293b; margin: 0 0 10px 0; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-input">
        <h2>1. Cole o Chamado</h2>
        <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="extrairDados()"></textarea>
    </div>

    <div class="workspace">
        <div class="editor-box" id="editorBox">
            <h2>2. Formulário de Edição (Dados Extraídos)</h2>
            <div class="form-grid">
                <div class="field"><label>INC</label><input type="text" id="f_inc"></div>
                <div class="field"><label>Uniorg</label><input type="text" id="f_uniorg"></div>
                <div class="field full-width"><label>Endereço</label><input type="text" id="f_rua"></div>
                <div class="field"><label>Número</label><input type="text" id="f_num"></div>
                <div class="field"><label>Bairro</label><input type="text" id="f_bai"></div>
                <div class="field"><label>Cidade</label><input type="text" id="f_cid"></div>
                <div class="field"><label>UF</label><input type="text" id="f_uf"></div>
                <div class="field"><label>Modelo</label><input type="text" id="f_modelo"></div>
                <div class="field"><label>Serial</label><input type="text" id="f_sn"></div>
                <div class="field"><label>Patrimônio</label><input type="text" id="f_patri"></div>
                <div class="field"><label>Hostname</label><input type="text" id="f_host"></div>
                <div class="field"><label>MAC</label><input type="text" id="f_mac"></div>
                <div class="field"><label>Matrícula</label><input type="text" id="f_matricula"></div>
                <div class="field"><label>Solicitante</label><input type="text" id="f_resp"></div>
                <div class="field full-width"><label>Solução</label><input type="text" id="f_solucao"></div>
            </div>
            <div class="btn-group">
                <button class="btn-save" onclick="salvarAtendimento()">💾 Salvar</button>
                <button class="btn-pdf" id="btnGerar" onclick="gerarERenderizar()">👁️ Visualizar RAT</button>
            </div>
        </div>

        <div class="preview-box" id="previewBox">
            <span style="color:white; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: block;">PRÉ-VISUALIZAÇÃO DA RAT:</span>
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    // =========================================================
    // 1. CONFIGURAÇÕES BASE (IDÊNTICAS AO SEU CÓDIGO)
    // =========================================================
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';
    const CPF_FIXO = "327.190.648-31";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // TODAS AS SUAS COORDENADAS ORIGINAIS PRESERVADAS
    const POS = {
        inc: 123, uniorgX: 64, ruaX: 79, numX: 300, cidX: 338, ufX: 43, baiX: 65,
        modX: 69, hostX: 78, patriX: 88, snX: 110, macX: 91, solX: 30, respX: 95, 
        matriX: 83, tecX: 347, cpfX: 346, locX: 123, diaX: 376, mesX: 410, anoX: 441,
        h_i: 91, m_i: 110, h_c: 91, m_c: 110, h_a: 418, m_a: 436
    };

    let dados = { tecnico: 'WILLIAN DO CARMO MORAIS', cpf: CPF_FIXO, p:{h:'00',m:'00'}, c:{h:'00',m:'00'}, a:{h:'00',m:'00'} };

    // =========================================================
    // 2. FUNÇÕES DE LÓGICA (IDÊNTICAS AO SEU CÓDIGO)
    // =========================================================
    function medirLarguraTexto(texto) {
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        context.font = "bold 11px Arial";
        return context.measureText(texto.toUpperCase()).width;
    }

    function limitarNomeSolicitante(nome) {
        const LARGURA_MAXIMA_PX = 155;
        let partes = nome.split(' ').filter(p => !(['da', 'de', 'do', 'das', 'dos'].includes(p.toLowerCase())));
        while (partes.length > 1 && medirLarguraTexto(partes.join(' ')) > LARGURA_MAXIMA_PX) partes.pop();
        return partes.join(' ').toUpperCase();
    }

    async function buscarBairro(cep) {
        try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if (!data.erro) document.getElementById('f_bai').value = data.bairro.toUpperCase();
        } catch (e) {}
    }

    // =========================================================
    // 3. EXTRAÇÃO E PREENCHIMENTO DO FORMULÁRIO
    // =========================================================
    async function extrairDados() {
        const textoInput = document.getElementById('textoBruto').value;
        if(!textoInput) return;
        const texto = textoInput.toUpperCase();

        // Extração exata do código base
        const inc = (/(INC\d+)/i.exec(texto) || ["","---"])[1];
        const patri = (/SGPI\s*:\s*(\d+)/i.exec(texto) || ["","---"])[1];
        const host = (/HOSTNAME\s*:\s*(\S+)/i.exec(texto) || ["","---"])[1];
        const matricula = (/MATRÍCULA\s*:\s*(\d+)/i.exec(texto) || ["","---"])[1];
        const sn = (/(?:SN|SERIAL)\s*:\s*(\S+)/i.exec(texto) || ["","---"])[1];
        const mac = (/MAC\s*:\s*(\S+)/i.exec(texto) || ["",""])[1];
        const modelo = sn.startsWith('P') ? "LENOVO T14" : (sn.startsWith('B') ? "HP ELITEBOOK 640 G9" : "---");
        const solucao = texto.includes("BAIXA DE IMAGEM") ? "REALIZADO A BAIXA DE IMAGEM" : "REALIZADO MANUTENÇÃO PREVENTIVA/CORRETIVA";
        
        let nomeCapturado = (/SOLICITANTE\s*:\s*(.+)/i.exec(texto) || ["","---"])[1].trim();
        const resp = limitarNomeSolicitante(nomeCapturado);

        // Preenche o formulário
        document.getElementById('f_inc').value = inc;
        document.getElementById('f_uniorg').value = (/UNIORG\s*:\s*(\d+)/i.exec(texto) || ["","---"])[1];
        document.getElementById('f_patri').value = patri;
        document.getElementById('f_host').value = host;
        document.getElementById('f_sn').value = sn;
        document.getElementById('f_mac').value = mac;
        document.getElementById('f_modelo').value = modelo;
        document.getElementById('f_matricula').value = matricula;
        document.getElementById('f_resp').value = resp;
        document.getElementById('f_solucao').value = solucao;

        const mFullEnd = /ENDEREÇO\s*:\s*(.+)/i.exec(texto);
        if (mFullEnd) {
            const linhaEnd = mFullEnd[1];
            document.getElementById('f_rua').value = (/^([^0-9,]+)/.exec(linhaEnd) || ["","---"])[1].trim();
            document.getElementById('f_num').value = (/(\d+)/.exec(linhaEnd.replace(document.getElementById('f_rua').value, "")) || ["","---"])[1];
            document.getElementById('f_cid').value = (/-\s*([^,]+)/.exec(linhaEnd) || ["","---"])[1].trim().toUpperCase();
            document.getElementById('f_uf').value = (/,\s*([A-Z]{2})/.exec(linhaEnd) || ["",""])[1];
            const mCep = /(\d{8})/.exec(linhaEnd.replace(/\s/g, ""));
            if (mCep) buscarBairro(mCep[1]);
        }

        // Horários
        const reg = (l) => new RegExp(l + "\\s*:\\s*\\d{2}\\/\\d{2}\\/\\d{4}\\s+(\\d{2}):(\\d{2})", "i").exec(texto);
        const p = reg("INÍCIO"), c = reg("CHEGADA"), a = reg("ATENDIMENTO");
        if(p) dados.p = {h:p[1], m:p[2]}; if(c) dados.c = {h:c[1], m:c[2]}; if(a) dados.a = {h:a[1], m:a[2]};

        gerarERenderizar();
    }

    // =========================================================
    // 4. GERAÇÃO DO PDF (USANDO OS CAMPOS DO FORMULÁRIO)
    // =========================================================
    async function gerarERenderizar() {
        document.getElementById('previewBox').style.display = 'block';
        const btn = document.getElementById('btnGerar');
        btn.disabled = true;
        try {
            const response = await fetch(URL_MODELO_PDF + '?v=' + Date.now());
            const pdfDoc = await PDFLib.PDFDocument.load(await response.arrayBuffer());
            const page = pdfDoc.getPages()[0];
            const fontColor = PDFLib.rgb(0, 0, 0);

            const escrever = (id, x, y, s = 11) => {
                const val = document.getElementById(id).value;
                if(val && val !== '---' && val !== '') page.drawText(val, { x, y, size: s, color: fontColor });
            };

            // PREENCHIMENTO COM COORDENADAS ORIGINAIS
            escrever('f_inc', POS.inc, 768);
            escrever('f_uniorg', POS.uniorgX, 714);
            escrever('f_rua', POS.ruaX, 701, 10);
            escrever('f_num', POS.numX, 702);
            escrever('f_cid', POS.cidX, 689);
            escrever('f_uf', POS.ufX, 675); 
            escrever('f_bai', POS.baiX, 688);
            page.drawText("EQUIPAMENTO INOPERANTE", { x: 30, y: 555, size: 11, color: fontColor });
            escrever('f_modelo', POS.modX, 457); 
            escrever('f_host', POS.hostX, 443);
            escrever('f_patri', POS.patriX, 485); 
            escrever('f_sn', POS.snX, 471);
            escrever('f_mac', POS.macX, 430);
            escrever('f_solucao', POS.solX, 232); 
            escrever('f_resp', POS.respX, 174); 
            escrever('f_matricula', POS.matriX, 147);
            page.drawText(dados.tecnico, { x: POS.tecX, y: 176, size: 11, color: fontColor });
            page.drawText(dados.cpf, { x: POS.cpfX, y: 149, size: 11, color: fontColor }); 

            // Carimbos
            escrever('f_cid', POS.locX, 56); 
            const d = new Date();
            page.drawText(String(d.getDate()).padStart(2, '0'), { x: POS.diaX, y: 58, size: 11, color: fontColor }); 
            page.drawText(String(d.getMonth() + 1).padStart(2, '0'), { x: POS.mesX, y: 58, size: 11, color: fontColor }); 
            page.drawText(String(d.getFullYear()), { x: POS.anoX, y: 58, size: 11, color: fontColor }); 

            // Horários
            page.drawText(dados.p.h, { x: POS.h_i, y: 747, size: 10, color: fontColor });
            page.drawText(dados.p.m, { x: POS.m_i, y: 747, size: 10, color: fontColor });
            page.drawText(dados.p.h ? dados.c.h : '00', { x: POS.h_c, y: 736, size: 10, color: fontColor });
            page.drawText(dados.p.h ? dados.c.m : '00', { x: POS.m_c, y: 736, size: 10, color: fontColor });
            page.drawText(dados.a.h, { x: POS.h_a, y: 749, size: 10, color: fontColor });
            page.drawText(dados.a.m, { x: POS.m_a, y: 749, size: 10, color: fontColor });

            const pdfBytes = await pdfDoc.save();
            const pdf = await pdfjsLib.getDocument({data: pdfBytes}).promise;
            const pdfPage = await pdf.getPage(1);
            const canvas = document.getElementById('pdfCanvas');
            const viewport = pdfPage.getViewport({scale: 2.0}); 
            canvas.height = viewport.height; canvas.width = viewport.width;
            await pdfPage.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
        } catch (e) { alert(e.message); } finally { btn.disabled = false; }
    }

    async function salvarAtendimento() {
        const inc = document.getElementById('f_inc').value;
        const { error } = await supabaseClient.from('chamados').insert([{ numero_inc: inc, analista: 'Willian' }]);
        alert(error ? "Erro ao salvar" : "Salvo!");
    }
</script>
</body>
</html>
