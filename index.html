<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de RAT</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        /* Se a RAT estiver invertida, verifique se estas classes 
           estão sendo aplicadas indevidamente no seu CSS:
           
           .rat-inversa { transform: rotate(180deg); }
           ou
           .rat-espelhada { transform: scaleY(-1); }
        */
        #rat-container {
            border: 1px solid #ccc;
            padding: 20px;
            width: 100%;
            max-width: 800px;
            /* Garante que a orientação esteja correta */
            transform: none !important; 
        }
    </style>
</head>
<body>
    <h1>Visualização do Chamado</h1>
    <div id="rat-container">
        <h2>RAT - Relatório de Atendimento</h2>
        <p>Conteúdo do atendimento técnico...</p>
    </div>

    <script>
        // Exemplo de verificação de erro no log
        function verificarOrientacao() {
            const container = document.getElementById('rat-container');
            const estilo = window.getComputedStyle(container);
            console.log("Transformação aplicada:", estilo.transform);
        }
        
        window.onload = verificarOrientacao;
    </script>
</body>
</html>
