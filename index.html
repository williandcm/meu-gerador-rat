<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .card-input { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        textarea { width: 100%; height: 80px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: none; outline: none; }
        .workspace { display: flex; flex-direction: row; gap: 20px; width: 100%; justify-content: center; align-items: flex-start; }
        .editor-box { flex: 1; min-width: 350px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-box { flex: 1; min-width: 350px; background: #525659; padding: 15px; border-radius: 12px; text-align: center; display: block; }
        @media (max-width: 1024px) { .workspace { flex-direction: column; align-items: center; } .editor-box, .preview-box { width: 100%; min-width: unset; } }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .equip-container, .time-container { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .column-title { font-size: 11px; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; text-align: center; border-bottom: 1px dashed #cbd5e1; padding-bottom: 3px; }
        .field { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }
        .field label { font-size: 9px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .field input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: #f8fafc; font-weight: bold; text-transform: uppercase; width: 100%; box-sizing: border-box; }
        .field input.time-input { text-align: center; font-size: 16px; letter-spacing: normal; }
        canvas { width: 100% !important; height: auto !important; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; font-size: 14px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-pdf { background: var(--success); color: white; }
        h2 { font-size: 1rem; color: #1e293b; margin: 0 0 10px 0; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-input">
        <h2>1. Cole o Chamado</h2>
        <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="extrairDados()"></textarea>
    </div>

    <div class="workspace">
        <div class="editor-box" id="editorBox">
            <h2>2. Editor em Tempo Real</h2>
            <div class="form-grid">
                <div class="field full-width"><label>INC</label><input type="text" id="f_inc"></div>
                <div class="time-container">
                    <div>
                        <div class="column-title">Percurso</div>
                        <div class="field"><label>Hora Partida</label><input type="text" id="f_partida" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                        <div class="field"><label>Hora Chegada</label><input type="text" id="f_chegada" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                    </div>
                    <div>
                        <div class="column-title">Atendimento</div>
                        <div class="field"><label>Hora Início Atendimento</label><input type="text" id="f_inicio_ate" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                        <div class="field"><label>Hora Término Atendimento</label><input type="text" id="f_termino_ate" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                    </div>
                </div>
                <div class="field full-width"><label>Uniorg</label><input type="text" id="f_uniorg"></div>
                <div class="field full-width"><label>Endereço</label><input type="text" id="f_rua"></div>
                <div class="field"><label>Número</label><input type="text" id="f_num"></div>
                <div class="field"><label>Bairro</label><input type="text" id="f_bai"></div>
                <div class="field"><label>Cidade</label><input type="text" id="f_cid"></div>
                <div class="field"><label>UF</label><input type="text" id="f_uf"></div>
                <div class="field full-width"><label>Solução</label><input type="text" id="f_solucao" oninput="sincronizarMac()"></div>
                <div class="field"><label>Data Atendimento</label><input type="text" id="f_data_completa" placeholder="DD/MM/AAAA"></div>
            </div>
            <div class="btn-group">
                <button class="btn-save" onclick="salvarAtendimento()">💾 Salvar</button>
                <button class="btn-pdf" onclick="baixarPdf()">📥 Baixar PDF</button>
            </div>
        </div>

        <div class="preview-box" id="previewBox">
            <span style="color:white; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: block;">PRÉ-VISUALIZAÇÃO DA RAT:</span>
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function salvarAtendimento() {
        const dados = {
            numero_inc: document.getElementById('f_inc').value,
            cidade: document.getElementById('f_cid').value,
            data_atendimento: document.getElementById('f_data_completa').value,
            endereco: document.getElementById('f_rua').value,
            hora_chegada: document.getElementById('f_chegada').value,
            hora_inicio_ate: document.getElementById('f_inicio_ate').value,
            hora_partida: document.getElementById('f_partida').value,
            hora_termino_ate: document.getElementById('f_termino_ate').value,
            texto_bruto: document.getElementById('textoBruto').value,
            analista: 'Willian'
        };

        try {
            const { error } = await supabaseClient.from('chamados').insert([dados]);
            if (error) {
                console.error("Erro Supabase:", error);
                alert("Erro ao salvar: " + error.message);
            } else {
                alert("Salvo com sucesso!");
            }
        } catch (e) { alert("Erro inesperado: " + e.message); }
    }
    
    // ... restante das funções (extrairDados, gerarERenderizar, etc.) permanecem iguais
</script>
</body>
</html>
