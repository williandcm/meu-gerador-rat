<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Pro Editor - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        .card-input { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        textarea { width: 100%; height: 80px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: none; outline: none; }
        .workspace { display: flex; flex-direction: row; gap: 20px; width: 100%; justify-content: center; align-items: flex-start; }
        .editor-box { flex: 1; min-width: 350px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-box { flex: 1; min-width: 350px; background: #525659; padding: 15px; border-radius: 12px; text-align: center; display: block; }
        @media (max-width: 1024px) { .workspace { flex-direction: column; align-items: center; } .editor-box, .preview-box { width: 100%; min-width: unset; } }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .time-container { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .field { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }
        .field label { font-size: 9px; font-weight: bold; color: #64748b; text-transform: uppercase; }
        .field input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: #f8fafc; font-weight: bold; text-transform: uppercase; }
        .field input.time-input { text-align: center; font-size: 16px; letter-spacing: 1px; }
        canvas { width: 100% !important; height: auto !important; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.2s; font-size: 14px; }
        .btn-save { background: var(--primary); color: white; }
        .btn-pdf { background: var(--success); color: white; }
        h2 { font-size: 1rem; color: #1e293b; margin: 0 0 10px 0; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-input">
        <h2>1. Cole o Chamado</h2>
        <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="extrairDados()"></textarea>
    </div>

    <div class="workspace">
        <div class="editor-box" id="editorBox">
            <h2>2. Editor em Tempo Real</h2>
            <div class="form-grid">
                <div class="field"><label>INC</label><input type="text" id="f_inc"></div>
                <div class="field"><label>Uniorg</label><input type="text" id="f_uniorg"></div>
                <div class="time-container">
                    <div class="field"><label>Hora Partida</label><input type="text" id="f_partida" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                    <div class="field"><label>Hora Início Atendimento</label><input type="text" id="f_inicio_ate" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                    <div class="field"><label>Hora Chegada</label><input type="text" id="f_chegada" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                    <div class="field"><label>Hora Término Atendimento</label><input type="text" id="f_termino_ate" class="time-input" placeholder="00:00" maxlength="5" oninput="mascaraHora(this)"></div>
                </div>
                <div class="field full-width"><label>Endereço</label><input type="text" id="f_rua"></div>
                <div class="field"><label>Número</label><input type="text" id="f_num"></div>
                <div class="field"><label>Bairro</label><input type="text" id="f_bai"></div>
                <div class="field"><label>Cidade</label><input type="text" id="f_cid"></div>
                <div class="field"><label>UF</label><input type="text" id="f_uf"></div>
                <div class="field"><label>Patrimônio (Ret)</label><input type="text" id="f_patri_ret"></div>
                <div class="field"><label>Hostname (Ret)</label><input type="text" id="f_host_ret"></div>
                <div class="field"><label>Série (Ret)</label><input type="text" id="f_sn_ret"></div>
                <div class="field"><label>MAC (Ret)</label><input type="text" id="f_mac_ret"></div>
                <div class="field full-width"><label>Modelo</label><input type="text" id="f_modelo"></div>
                <div class="field"><label>Solicitante</label><input type="text" id="f_resp"></div>
                <div class="field"><label>Matrícula</label><input type="text" id="f_matricula"></div>
                <div class="field full-width"><label>Solução</label><input type="text" id="f_solucao"></div>
            </div>
            <div class="btn-group">
                <button class="btn-save" onclick="salvarAtendimento()">💾 Salvar</button>
                <button class="btn-pdf" onclick="baixarPdf()">📥 Baixar PDF</button>
            </div>
        </div>

        <div class="preview-box" id="previewBox">
            <span style="color:white; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: block;">PRÉ-VISUALIZAÇÃO DA RAT:</span>
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const POS = {
        inc: { x: 123, y: 768 }, uniorg: { x: 64, y: 714 }, rua: { x: 79, y: 701, s: 10 }, 
        num: { x: 300, y: 702 }, cid: { x: 338, y: 689 }, uf: { x: 43, y: 675 },
        bai: { x: 65, y: 688 }, modelo: { x: 69, y: 457 }, host: { x: 78, y: 443 }, 
        patri: { x: 88, y: 485 }, sn: { x: 110, y: 471 }, mac: { x: 91, y: 430 }, 
        solucao: { x: 30, y: 232 }, resp: { x: 95, y: 174 }, matri: { x: 83, y: 147 }, 
        tecnico: { x: 347, y: 176 }, cpf: { x: 346, y: 149 }, local: { x: 123, y: 56 }, 
        dia: { x: 376, y: 58 }, mes: { x: 410, y: 58 }, ano: { x: 441, y: 58 },
        h_partida: { x: 91, y: 747 }, m_partida: { x: 110, y: 747 },
        h_chegada: { x: 91, y: 736 }, m_chegada: { x: 110, y: 736 },
        h_inicio_ate: { x: 418, y: 749 }, m_inicio_ate: { x: 436, y: 749 }
    };

    let modeloPdfBytes = null;
    window.onload = async () => {
        const res = await fetch(URL_MODELO_PDF + '?v=' + Date.now());
        modeloPdfBytes = await res.arrayBuffer();
        gerarERenderizar();
    };

    function mascaraHora(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length > 2) v = v.slice(0, 2) + ":" + v.slice(2, 4);
        input.value = v;
        gerarERenderizar();
    }

    function extrairDados() {
        const texto = document.getElementById('textoBruto').value.toUpperCase();
        document.getElementById('f_inc').value = (/(INC\d+)/i.exec(texto) || ["",""])[1];
        document.getElementById('f_cid').value = (/-\s*([^,]+)/.exec(texto) || ["",""])[1].trim();
        // ... (resto da lógica de extração)
        gerarERenderizar();
    }

    async function aplicarDadosNoPdf() {
        const pdfDoc = await PDFLib.PDFDocument.load(modeloPdfBytes);
        const page = pdfDoc.getPages()[0];
        
        // Escreve a Cidade no campo LOCAL
        const cidade = document.getElementById('f_cid').value;
        if (cidade) page.drawText(cidade.toUpperCase(), { x: POS.local.x, y: POS.local.y, size: 11 });

        // Escreve os outros campos...
        const d = new Date();
        page.drawText(String(d.getDate()).padStart(2, '0'), { x: POS.dia.x, y: POS.dia.y, size: 11 });
        page.drawText(String(d.getMonth() + 1).padStart(2, '0'), { x: POS.mes.x, y: POS.mes.y, size: 11 });
        page.drawText(String(d.getFullYear()), { x: POS.ano.x, y: POS.ano.y, size: 11 });
        
        return pdfDoc;
    }

    async function gerarERenderizar() {
        const pdfDoc = await aplicarDadosNoPdf();
        const bytes = await pdfDoc.save();
        const pdf = await pdfjsLib.getDocument({data: bytes}).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 2.0});
        const canvas = document.getElementById('pdfCanvas');
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({canvasContext: canvas.getContext('2d'), viewport: viewport}).promise;
    }

    async function baixarPdf() {
        const pdfDoc = await aplicarDadosNoPdf();
        const bytes = await pdfDoc.save();
        const blob = new Blob([bytes], { type: 'application/pdf' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "RAT.pdf";
        link.click();
    }
</script>
</body>
</html>
