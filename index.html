<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de RAT - Willian</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h2 { color: #1e293b; text-align: center; border-bottom: 2px solid #3b82f6; padding-bottom: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 15px; resize: none; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
        button { flex: 1; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; transition: 0.3s; font-size: 15px; }
        .btn-save { background: #3b82f6; color: white; }
        .btn-pdf { background: #10b981; color: white; }
        
        /* Área do PDF */
        #pdfPreviewContainer { display: none; width: 100%; margin-top: 20px; border-top: 2px solid #e2e8f0; padding-top: 20px; }
        #pdfViewer { width: 100%; height: 600px; border: 1px solid #cbd5e1; border-radius: 8px; }
        
        #status { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; text-align: center; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="card">
    <h2>📄 Gerador de RAT Santander</h2>
    
    <textarea id="textoBruto" placeholder="Cole o chamado aqui..." oninput="detectarINC()"></textarea>
    
    <div style="margin-bottom: 15px; font-weight: bold; color: #1e293b;">
        INC Detectado: <span id="displayInc" style="color: #3b82f6;">---</span>
    </div>

    <div class="btn-group">
        <button id="btnSave" class="btn-save" onclick="processarRAT()">1. Salvar Atendimento</button>
        <button class="btn-pdf" onclick="gerarVisualizacao()">2. Visualizar RAT Carimbada</button>
    </div>

    <div id="status"></div>

    <div id="pdfPreviewContainer">
        <h3 style="font-size: 14px; color: #64748b; margin-bottom: 10px;">Prévia do Documento:</h3>
        <object id="pdfViewer" data="" type="application/pdf">
            <p>Seu navegador não suporta visualização de PDF. <a id="pdfLinkFallback" href="#" target="_blank">Clique aqui para abrir diretamente.</a></p>
        </object>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://amqpouzfsykkahwgatmy.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1cvN1pi45smgwKF3DkR9iw_-d7MvZ8o';
    const URL_MODELO_PDF = 'https://amqpouzfsykkahwgatmy.supabase.co/storage/v1/object/public/rat-files/RAT%20EM%20BRANCO.pdf';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let numeroIncAtual = '';

    function detectarINC() {
        const texto = document.getElementById('textoBruto').value.trim();
        const match = /(INC\d+)/i.exec(texto);
        numeroIncAtual = match ? match[1].toUpperCase() : "NÃO DETECTADO";
        document.getElementById('displayInc').innerText = numeroIncAtual;
    }

    async function processarRAT() {
        const texto = document.getElementById('textoBruto').value.trim();
        if(!texto) return alert("Cole o texto primeiro!");
        mostrarStatus("⌛ Gravando no Supabase...", "#e0f2fe");

        try {
            const { error } = await supabaseClient
                .from('chamados')
                .insert([{ numero_inc: numeroIncAtual, texto_bruto: texto, analista: 'Willian' }]);
            if (error) throw error;
            mostrarStatus("✅ Salvo com sucesso!", "#dcfce7", 3000);
        } catch (err) {
            alert("Erro: " + err.message);
        }
    }

    async function gerarVisualizacao() {
        try {
            mostrarStatus("⌛ Gerando visualização...", "#e0f2fe");
            
            // Carregando o PDF ignorando o cache para evitar erros de permissão antiga
            const response = await fetch(URL_MODELO_PDF, { mode: 'cors' });
            if (!response.ok) throw new Error("Erro ao acessar o arquivo no Supabase Storage.");
            
            const bytes = await response.arrayBuffer();
            const pdfDoc = await PDFLib.PDFDocument.load(bytes);
            const firstPage = pdfDoc.getPages()[0];

            // Coordenadas: X=123, Y=768, Tamanho=11, Cor=Preto
            firstPage.drawText(numeroIncAtual, {
                x: 123, 
                y: 768, 
                size: 11,
                color: PDFLib.rgb(0, 0, 0) 
            });

            const pdfBytes = await pdfDoc.save();
            const pdfBlob = new Blob([pdfBytes], { type: 'application/pdf' });
            const pdfUrl = URL.createObjectURL(pdfBlob);

            // Atualiza o visualizador
            const viewer = document.getElementById('pdfViewer');
            const fallbackLink = document.getElementById('pdfLinkFallback');
            
            viewer.data = pdfUrl;
            fallbackLink.href = pdfUrl;
            
            document.getElementById('pdfPreviewContainer').style.display = 'block';
            mostrarStatus("✅ Pronto!", "#dcfce7", 2000);
            
        } catch (e) {
            console.error(e);
            alert("Erro ao abrir a RAT: Verifique se o arquivo no Supabase está como 'Public'.");
        }
    }

    function mostrarStatus(msg, cor, t=0) {
        const s = document.getElementById('status');
        s.style.display = 'block'; s.style.background = cor; s.innerText = msg;
        if(t > 0) setTimeout(() => s.style.display = 'none', t);
    }
</script>
</body>
</html>
